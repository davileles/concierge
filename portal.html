<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>CDV Concierge — Portal do Viajante</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #09090b;
  --surface: rgba(255,255,255,.04);
  --surface-hover: rgba(255,255,255,.06);
  --border: rgba(255,255,255,.08);
  --border-strong: rgba(255,255,255,.12);
  --text: rgba(255,255,255,.88);
  --text-2: rgba(255,255,255,.5);
  --text-3: rgba(255,255,255,.25);
  --gold: rgba(210,168,90,.9);
  --gold-bg: rgba(210,168,90,.08);
  --gold-border: rgba(210,168,90,.2);
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
}

/* ── SHARED ── */
.label-xs {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--text-3);
}

/* ── LOGIN ── */
#login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
}

.login-box {
  width: 100%;
  max-width: 400px;
}

.login-wordmark {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 52px;
  justify-content: center;
}

.login-wordmark-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

.login-wordmark-text {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-3);
}

.login-headline {
  font-size: 30px;
  font-weight: 300;
  line-height: 1.2;
  letter-spacing: -0.5px;
  color: var(--text);
  margin-bottom: 10px;
  text-align: center;
}

.login-sub {
  font-size: 14px;
  color: var(--text-3);
  text-align: center;
  margin-bottom: 40px;
  line-height: 1.6;
}

.login-field {
  position: relative;
  margin-bottom: 10px;
}

.login-field-icon {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  font-size: 15px;
  pointer-events: none;
}

.login-field input {
  width: 100%;
  padding: 14px 16px 14px 44px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .2s;
}

.login-field input::placeholder { color: var(--text-3); }
.login-field input:focus { border-color: var(--border-strong); }

.login-btn {
  width: 100%;
  padding: 14px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: opacity .15s;
  margin-bottom: 16px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}

.login-btn:hover { opacity: .88; }
.login-btn:active { opacity: .75; }
.login-btn:disabled { opacity: .4; cursor: not-allowed; }

.login-error {
  font-size: 12px;
  color: rgba(255,100,100,.8);
  text-align: center;
  min-height: 18px;
}

.login-footer {
  margin-top: 36px;
  text-align: center;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: .3px;
}

/* top line accent */
.login-box::before {
  content: '';
  display: block;
  width: 40px; height: 1px;
  background: var(--gold);
  margin: 0 auto 52px;
  opacity: .6;
}

/* ── PORTAL ── */
#portal-wrap { display: none; min-height: 100vh; }

.nav {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  height: 56px;
  border-bottom: 1px solid var(--border);
  background: rgba(9,9,11,.85);
  backdrop-filter: blur(16px);
}

.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-brand-icon {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--surface); border: 1px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.nav-brand-name {
  font-size: 11px; font-weight: 500; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-3);
}
.nav-user { font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 16px; }
.nav-user strong { color: var(--text); font-weight: 500; }
.nav-logout {
  font-size: 12px; color: var(--text-3);
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 12px; cursor: pointer;
  font-family: inherit; transition: color .15s, border-color .15s;
}
.nav-logout:hover { color: var(--text-2); border-color: var(--border-strong); }

/* Hero */
.hero {
  max-width: 760px; margin: 0 auto;
  padding: 52px 32px 40px;
  border-bottom: 1px solid var(--border);
}

.hero-greeting {
  font-size: 26px; font-weight: 300;
  letter-spacing: -0.4px; color: var(--text);
  margin-bottom: 4px;
}

.hero-email { font-size: 13px; color: var(--text-3); margin-bottom: 36px; }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
}

.stat-num {
  font-size: 26px; font-weight: 300;
  color: var(--text); letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.stat-label { font-size: 10px; color: var(--text-3); letter-spacing: 1.2px; text-transform: uppercase; }

/* Content */
.content {
  max-width: 760px; margin: 0 auto;
  padding: 36px 32px 80px;
}

.section-label {
  font-size: 10px; font-weight: 500;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}

.section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* Viagem card */
.viagem-card {
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 12px;
  transition: border-color .2s;
}

.viagem-card:hover { border-color: var(--border-strong); }

.viagem-header {
  padding: 20px 24px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer; user-select: none;
}

.viagem-nome {
  font-size: 15px; font-weight: 400;
  color: var(--text); flex: 1;
}

.viagem-meta {
  font-size: 12px; color: var(--text-3);
  margin-top: 3px;
}

.viagem-progress-wrap { flex-shrink: 0; text-align: right; }

.viagem-pct {
  font-size: 11px; color: var(--text-3);
  margin-bottom: 6px; letter-spacing: .3px;
}

.viagem-bar {
  width: 72px; height: 2px;
  background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden;
}

.viagem-bar-fill {
  height: 100%; background: rgba(255,255,255,.35); border-radius: 99px;
  transition: width .6s cubic-bezier(.16,1,.3,1);
}

.viagem-chevron {
  font-size: 16px; color: var(--text-3);
  transition: transform .25s; flex-shrink: 0; margin-left: 8px;
}

.viagem-chevron.open { transform: rotate(90deg); color: var(--text-2); }

.viagem-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 16px 24px;
}

.viagem-body.open { display: block; }

/* Atividades */
.ativ-list { display: flex; flex-direction: column; gap: 6px; }

.ativ-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: background .15s;
}

.ativ-row:hover { background: var(--surface-hover); }

.ativ-icon { font-size: 16px; flex-shrink: 0; }

.ativ-body { flex: 1; }
.ativ-nome { font-size: 13px; font-weight: 400; color: var(--text-2); }
.ativ-titulo { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.ativ-desc { font-size: 11px; color: var(--text-3); margin-top: 4px; line-height: 1.5; }

.badge {
  font-size: 10px; font-weight: 500;
  letter-spacing: .8px; text-transform: uppercase;
  padding: 3px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0;
}

.badge-concluida { color: rgba(255,255,255,.4); background: rgba(255,255,255,.06); }
.badge-andamento { color: rgba(110,181,255,.8); background: rgba(110,181,255,.08); }
.badge-pendente  { color: var(--gold); background: var(--gold-bg); }

/* Reserva box */
.reserva-box {
  margin-top: 10px;
  background: rgba(0,0,0,.3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}

.reserva-box-label {
  font-size: 10px; font-weight: 500;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 8px;
}

.res-cols { display: flex; flex-wrap: wrap; gap: 6px 18px; }
.res-col label { display: block; font-size: 10px; color: var(--text-3); margin-bottom: 1px; }
.res-col span { font-size: 12px; color: var(--text-2); font-weight: 500; }

/* Empty */
.empty { text-align: center; padding: 80px 24px; color: var(--text-3); }
.empty-icon { font-size: 40px; margin-bottom: 16px; display: block; opacity: .5; }
.empty-title { font-size: 15px; font-weight: 300; color: var(--text-2); margin-bottom: 6px; }

/* Spinner */
.spinner-wrap { display: flex; align-items: center; justify-content: center; padding: 80px; }
.spinner { width: 24px; height: 24px; border: 1.5px solid rgba(255,255,255,.1); border-top-color: rgba(255,255,255,.4); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Fade in */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeUp .4s ease both; }

@media (max-width: 600px) {
  .nav { padding: 0 18px; }
  .hero, .content { padding-left: 18px; padding-right: 18px; }
  .hero { padding-top: 36px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .nav-user span:first-child { display: none; }
  .viagem-header { padding: 16px 18px; }
  .viagem-body { padding: 14px 18px; }
  .viagem-bar { width: 52px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap">
  <div class="login-box fade-in">
    <div class="login-wordmark">
      <div class="login-wordmark-icon">✈</div>
      <span class="login-wordmark-text">CDV Concierge</span>
    </div>
    <h1 class="login-headline">Sua viagem,<br>acompanhada.</h1>
    <p class="login-sub">Acesse com o e-mail cadastrado para acompanhar reservas e atividades em tempo real.</p>
    <div class="login-field">
      <span class="login-field-icon">✉</span>
      <input type="email" id="login-email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')entrar()"/>
    </div>
    <button class="login-btn" id="btn-entrar" onclick="entrar()">
      Acessar <span style="opacity:.4">→</span>
    </button>
    <div class="login-error" id="login-error"></div>
    <div class="login-footer">Acesso exclusivo · CDV Concierge</div>
  </div>
</div>

<!-- PORTAL -->
<div id="portal-wrap">
  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-brand-icon">✈</div>
      <span class="nav-brand-name">CDV Concierge</span>
    </div>
    <div class="nav-user">
      <span>Olá, <strong id="nav-nome"></strong></span>
      <button class="nav-logout" onclick="sair()">Sair</button>
    </div>
  </nav>

  <div class="hero">
    <h2 class="hero-greeting" id="portal-nome">Olá</h2>
    <p class="hero-email" id="portal-email"></p>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-viagens">0</div><div class="stat-label">Viagens</div></div>
      <div class="stat"><div class="stat-num" id="stat-atividades">0</div><div class="stat-label">Atividades</div></div>
      <div class="stat"><div class="stat-num" id="stat-concluidas">0</div><div class="stat-label">Concluídas</div></div>
      <div class="stat"><div class="stat-num" id="stat-reservas">0</div><div class="stat-label">Reservas</div></div>
    </div>
  </div>

  <div class="content">
    <div class="section-label">Suas viagens</div>
    <div id="portal-content"><div class="spinner-wrap"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
var PROXY = 'https://cdv-proxy-production.up.railway.app';
var _dados = null;

function fmtDate(d) {
  if (!d) return '—';
  var p = d.split('-');
  return p.length < 3 ? d : p[2]+'/'+p[1]+'/'+p[0];
}

function toTitleCase(str) {
  if (!str) return '';
  return str.trim().split(/\s+/).slice(0,2).map(function(w){
    return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();
  }).join(' ');
}

function statusLabel(s) {
  return {pendente:'Pendente',andamento:'Em andamento',concluida:'Concluída'}[s]||s;
}

var ORDEM=['Passagem Doméstica','Passagem Internacional','Hotel','Aluguel de Carro','Seguro Viagem','Ativação Seguro Cartão','Passeio/Atividade','Roteiro Personalizado'];

function sortAtivs(arr){
  return arr.slice().sort(function(a,b){
    var ia=ORDEM.indexOf(a.nome),ib=ORDEM.indexOf(b.nome);
    if(ia===-1)ia=ORDEM.length; if(ib===-1)ib=ORDEM.length;
    return ia-ib;
  });
}

function resCols(r) {
  if(!r) return [];
  var cols=[];
  if(r.tipo==='voo'){
    cols=[
      {label:'Trecho ida',val:(r.origem||'?')+' → '+(r.destino||'?')+(r.conexao?' (via '+r.conexao+')':'')},
      {label:'Data',val:fmtDate(r.dataIda)+(r.horaPartida?' · '+r.horaPartida:'')+(r.horaChegada?' → '+r.horaChegada:'')},
    ];
    if(r.dataVolta) cols.push({label:'Volta',val:(r.origemVolta||r.destino||'?')+' → '+(r.destinoVolta||r.origem||'?')});
    if(r.dataVolta) cols.push({label:'Data volta',val:fmtDate(r.dataVolta)+(r.horaPartidaVolta?' · '+r.horaPartidaVolta:'')});
    if(r.ciaIda||r.cia) cols.push({label:'Cia aérea',val:r.ciaIda||r.cia});
    if(r.pnr) cols.push({label:'Localizador',val:r.pnr});
  } else if(r.tipo==='hotel'){
    cols=[{label:'Hotel',val:r.hotelNome||null},{label:'Check-in',val:fmtDate(r.checkin)},{label:'Check-out',val:fmtDate(r.checkout)}];
    if(r.conf) cols.push({label:'Confirmação',val:r.conf});
  } else if(r.tipo==='carro'){
    cols=[{label:'Locadora',val:r.locadora||null},{label:'Retirada',val:fmtDate(r.retData)},{label:'Devolução',val:fmtDate(r.devData)}];
    if(r.conf) cols.push({label:'Confirmação',val:r.conf});
  } else if(r.tipo==='passeio'){
    cols=[{label:'Passeio',val:r.passeioNome||null},{label:'Data',val:fmtDate(r.dataPasseio)}];
    if(r.conf) cols.push({label:'Voucher',val:r.conf});
  }
  return cols.filter(function(c){return c.val;});
}

function renderPortal() {
  var viagens=(_dados.viagens||[]).slice().sort(function(a,b){return (a.inicio||'9')<(b.inicio||'9')?-1:1;});
  var reservas=_dados.reservas||[];
  var el=document.getElementById('portal-content');

  var totalAtivs=0,totalConc=0;
  viagens.forEach(function(v){var a=v.atividades||[];totalAtivs+=a.length;totalConc+=a.filter(function(x){return x.status==='concluida';}).length;});
  document.getElementById('stat-viagens').textContent=viagens.length;
  document.getElementById('stat-atividades').textContent=totalAtivs;
  document.getElementById('stat-concluidas').textContent=totalConc;
  document.getElementById('stat-reservas').textContent=reservas.length;

  if(!viagens.length){
    el.innerHTML='<div class="empty"><span class="empty-icon">🗺</span><div class="empty-title">Nenhuma viagem encontrada</div></div>';
    return;
  }

  el.innerHTML=viagens.map(function(v,vi){
    var ativs=sortAtivs(v.atividades||[]);
    var total=ativs.length, conc=ativs.filter(function(a){return a.status==='concluida';}).length;
    var pct=total?Math.round(conc/total*100):0;
    var meta=[];
    if(v.inicio&&v.fim) meta.push('📅 '+fmtDate(v.inicio)+' → '+fmtDate(v.fim));
    else if(v.inicio) meta.push('📅 A partir de '+fmtDate(v.inicio));
    if(total) meta.push(total+' atividade'+(total>1?'s':''));
    var bodyId='vb'+vi;

    var ativsHtml=ativs.length?ativs.map(function(a){
      var res=a.reservaId?reservas.find(function(r){return r.id===a.reservaId;}):null;
      var cols=resCols(res);
      var bc='badge-'+(a.status||'pendente');
      var resHtml=res?'<div class="reserva-box"><div class="reserva-box-label">Reserva vinculada</div><div class="res-cols">'+cols.map(function(c){return '<div class="res-col"><label>'+c.label+'</label><span>'+c.val+'</span></div>';}).join('')+'</div></div>':'';
      return '<div class="ativ-row"><div class="ativ-icon">'+(a.icon||'·')+'</div><div class="ativ-body"><div class="ativ-nome">'+a.nome+'</div>'+(a.titulo?'<div class="ativ-titulo">'+a.titulo+'</div>':'')+(a.descricao?'<div class="ativ-desc">'+a.descricao+'</div>':'')+resHtml+'</div><span class="badge '+bc+'">'+statusLabel(a.status)+'</span></div>';
    }).join(''):'<div style="color:var(--text-3);font-size:13px;padding:8px 0">Nenhuma atividade cadastrada.</div>';

    return '<div class="viagem-card"><div class="viagem-header" onclick="toggleViagem(\''+bodyId+'\','+vi+')"><div style="flex:1"><div class="viagem-nome">'+v.nome+'</div>'+(meta.length?'<div class="viagem-meta">'+meta.join(' · ')+'</div>':'')+'</div><div class="viagem-progress-wrap"><div class="viagem-pct">'+pct+'%</div><div class="viagem-bar"><div class="viagem-bar-fill" style="width:'+pct+'%"></div></div></div><div class="viagem-chevron" id="chev'+vi+'">›</div></div><div class="viagem-body" id="'+bodyId+'"><div class="ativ-list">'+ativsHtml+'</div></div></div>';
  }).join('');
}

function toggleViagem(id,vi){
  var body=document.getElementById(id);
  var chev=document.getElementById('chev'+vi);
  var open=body.classList.toggle('open');
  if(chev) chev.classList.toggle('open',open);
}

function entrar() {
  var email=document.getElementById('login-email').value.trim().toLowerCase();
  var errEl=document.getElementById('login-error');
  if(!email||!email.includes('@')){errEl.textContent='Digite um e-mail válido.';return;}
  errEl.textContent='';
  var btn=document.getElementById('btn-entrar');
  btn.textContent='Aguarde…'; btn.disabled=true;

  fetch(PROXY+'/concierge/cfg')
    .then(function(r){return r.json();})
    .then(function(cfgRes){
      var cfg=cfgRes.data||{};
      if(!cfg.url) throw new Error('Serviço temporariamente indisponível.');
      function colIdx(l){var s=(l||'A').toUpperCase(),r=0;for(var i=0;i<s.length;i++)r=r*26+(s.charCodeAt(i)-64);return r-1;}
      var sheetUrl=cfg.url+'?aba='+encodeURIComponent(cfg.aba||'Clientes')+'&linha='+encodeURIComponent(cfg.linha||2);
      return fetch(sheetUrl).then(function(r){return r.json();}).then(function(sheetData){
        var rows=sheetData.rows||[];
        var clientesMatch=rows.map(function(row){return{nome:String(row[colIdx(cfg.colNome)]||'').trim(),email:String(row[colIdx(cfg.colEmail)]||'').trim().toLowerCase()};}).filter(function(c){return c.email===email&&c.nome;});
        if(!clientesMatch.length) throw new Error('Nenhuma viagem encontrada para este e-mail.');
        var nomesCliente=clientesMatch.map(function(c){var p=c.nome.trim().split(/\s+/);return(p[0].charAt(0).toUpperCase()+p[0].slice(1).toLowerCase())+(p[1]?' '+p[1].charAt(0).toUpperCase()+p[1].slice(1).toLowerCase():'');});
        return Promise.all([
          fetch(PROXY+'/concierge/viagens').then(function(r){return r.json();}),
          fetch(PROXY+'/concierge/reservas').then(function(r){return r.json();})
        ]).then(function(res){
          var todasViagens=res[0].data||[],todasReservas=res[1].data||[];
          function norm2(s){if(!s)return '';var p=s.trim().split(/\s+/);return(p[0].charAt(0).toUpperCase()+p[0].slice(1).toLowerCase())+(p[1]?' '+p[1].charAt(0).toUpperCase()+p[1].slice(1).toLowerCase():'');}
          function nomeMatch(campo){if(!campo)return false;var lista=Array.isArray(campo)?campo:String(campo).split(',');return lista.some(function(n){var normalizado=norm2(n.trim());return nomesCliente.some(function(nc){return normalizado===nc||normalizado.toLowerCase().split(' ')[0]===nc.toLowerCase().split(' ')[0];});});}
          return{clientes:clientesMatch,nomesCliente:nomesCliente,viagens:todasViagens.filter(function(v){var c=Array.isArray(v.clientes)?v.clientes:(typeof v.clientes==='string'?v.clientes.split(','):[v.clientes]);return c.some(function(n){return nomeMatch(n.trim());});}),reservas:todasReservas.filter(function(r){return nomeMatch(r.cliente);})};
        });
      });
    })
    .then(function(dados){
      btn.innerHTML='Acessar <span style="opacity:.4">→</span>'; btn.disabled=false;
      _dados=dados;
      var nome=toTitleCase(dados.clientes[0].nome).split(' ')[0];
      document.getElementById('portal-nome').textContent='Olá, '+nome+'.';
      document.getElementById('nav-nome').textContent=nome;
      document.getElementById('portal-email').textContent=email;
      document.getElementById('login-wrap').style.display='none';
      var pw=document.getElementById('portal-wrap');
      pw.style.display='block'; pw.style.minHeight='100vh';
      pw.classList.add('fade-in');
      renderPortal();
    })
    .catch(function(e){
      btn.innerHTML='Acessar <span style="opacity:.4">→</span>'; btn.disabled=false;
      errEl.textContent=e.message||'Erro de conexão. Tente novamente.';
    });
}

function sair(){
  _dados=null;
  var pw=document.getElementById('portal-wrap');
  pw.style.display='none'; pw.style.minHeight=''; pw.classList.remove('fade-in');
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('login-email').value='';
  document.getElementById('login-error').textContent='';
}

document.getElementById('login-email').focus();
</script>
