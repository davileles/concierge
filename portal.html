<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Travel Concierge — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1e2535;
  --surface: #2a3246;
  --card: #323c54;
  --border: #3d4a66;
  --border2: #4a5878;
  --text: #eeeeee;
  --muted: #8a9bbf;
  --muted2: #5a6a8a;
  --accent: #ff585e;
  --accent2: #e04449;
  --green: #34d399;
  --green-dim: rgba(52,211,153,.12);
  --green-border: rgba(52,211,153,.25);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,.12);
  --blue-border: rgba(96,165,250,.25);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,.12);
  --amber-border: rgba(251,191,36,.25);
  --font: 'Montserrat', sans-serif;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── ANIMAÇÕES ── */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulseAccent {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,88,94,.0); }
  50%       { box-shadow: 0 0 0 6px rgba(255,88,94,.12); }
}
@keyframes barFill {
  from { width: 0%; }
}
@keyframes countUp {
  from { opacity: 0; transform: translateY(6px) scale(.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.fade-in  { animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both; }
.slide-in { animation: slideIn .3s cubic-bezier(.16,1,.3,1) both; }

/* ── LOGIN ── */
#login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  background: var(--bg);
}

.login-box {
  width: 100%;
  max-width: 400px;
}

.login-wordmark {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 40px;
  justify-content: center;
}

.login-wordmark-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: transform .3s;
}
.login-wordmark-icon:hover { transform: rotate(-8deg) scale(1.1); }

.login-brand-name {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -.3px;
  line-height: 1.1;
}
.login-brand-sub {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1.2px;
  text-transform: uppercase;
}

.login-divider {
  width: 40px; height: 2px;
  background: var(--accent);
  border-radius: 2px;
  margin: 28px auto 28px;
}

.login-headline {
  font-size: 28px;
  font-weight: 800;
  line-height: 1.2;
  letter-spacing: -.5px;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
}

.login-headline span {
  color: var(--accent);
}

.login-sub {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 32px;
  line-height: 1.6;
  font-weight: 500;
}

.login-field {
  position: relative;
  margin-bottom: 10px;
}

.login-field-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted2);
  font-size: 15px;
  pointer-events: none;
}

.login-field input {
  width: 100%;
  padding: 13px 14px 13px 42px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  font-weight: 500;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.login-field input::placeholder { color: var(--muted2); }
.login-field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,88,94,.12);
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 800;
  font-family: var(--font);
  letter-spacing: .3px;
  cursor: pointer;
  transition: background .15s, transform .1s, box-shadow .2s;
  margin-bottom: 14px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.login-btn:hover { background: var(--accent2); box-shadow: 0 4px 16px rgba(255,88,94,.3); }
.login-btn:active { transform: scale(.98); }
.login-btn:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }

.login-error {
  font-size: 12px;
  font-weight: 600;
  color: #f87171;
  text-align: center;
  min-height: 18px;
}

.login-footer {
  margin-top: 28px;
  text-align: center;
  font-size: 11px;
  color: var(--muted2);
  letter-spacing: .3px;
  font-weight: 500;
}

/* ── PORTAL ── */
#portal-wrap { display: none; min-height: 100vh; }

/* NAV */
.nav {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  height: 56px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  border-bottom: 2px solid var(--border);
}

.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-brand-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--card); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.nav-brand-col { display: flex; flex-direction: column; gap: 1px; }
.nav-brand-name {
  font-size: 13px; font-weight: 800; color: var(--text);
  letter-spacing: -.2px; line-height: 1.1;
}
.nav-brand-sub {
  font-size: 9px; font-weight: 600; color: var(--accent);
  letter-spacing: 1.2px; text-transform: uppercase;
}
.nav-user { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 14px; font-weight: 500; }
.nav-user strong { color: var(--text); font-weight: 700; }
.nav-logout {
  font-size: 11px; font-weight: 700; color: var(--muted);
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 7px; padding: 5px 12px; cursor: pointer;
  font-family: var(--font); transition: color .15s, border-color .15s, background .15s;
  text-transform: uppercase; letter-spacing: .5px;
}
.nav-logout:hover { color: var(--text); border-color: var(--accent); }

/* HERO */
.hero {
  max-width: 780px; margin: 0 auto;
  padding: 48px 28px 36px;
  border-bottom: 1px solid var(--border);
}

.hero-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--accent);
  margin-bottom: 8px;
}

.hero-greeting {
  font-size: 30px; font-weight: 800;
  letter-spacing: -.5px; color: var(--text);
  margin-bottom: 4px;
  line-height: 1.2;
}

.hero-email { font-size: 13px; color: var(--muted); margin-bottom: 32px; font-weight: 500; }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  transition: border-color .15s, transform .15s;
  cursor: default;
}
.stat:hover { border-color: var(--border2); transform: translateY(-2px); }

.stat-num {
  font-size: 28px; font-weight: 900;
  color: var(--accent); letter-spacing: -1px;
  margin-bottom: 4px;
  animation: countUp .5s cubic-bezier(.16,1,.3,1) both;
}

.stat-label {
  font-size: 10px; color: var(--muted); letter-spacing: 1px;
  text-transform: uppercase; font-weight: 600;
}

/* CONTENT */
.content {
  max-width: 780px; margin: 0 auto;
  padding: 32px 28px 80px;
}

.section-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::before {
  content: '';
  width: 14px; height: 2px;
  background: var(--accent); flex-shrink: 0;
  border-radius: 2px;
}
.section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* VIAGEM CARD */
.viagem-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 10px;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  animation: slideIn .35s cubic-bezier(.16,1,.3,1) both;
}
.viagem-card:hover { border-color: var(--border2); }
.viagem-card.expanded {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px rgba(255,88,94,.15), 0 4px 24px rgba(0,0,0,.25);
}

.viagem-header {
  padding: 18px 22px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; user-select: none;
  transition: background .15s;
}
.viagem-header:hover { background: rgba(255,255,255,.02); }

.viagem-icon {
  width: 36px; height: 36px; flex-shrink: 0;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.viagem-info { flex: 1; min-width: 0; }

.viagem-nome {
  font-size: 15px; font-weight: 700;
  color: var(--text); letter-spacing: -.2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.viagem-meta {
  font-size: 12px; color: var(--muted);
  margin-top: 3px; font-weight: 500;
}

.viagem-progress-wrap { flex-shrink: 0; text-align: right; min-width: 80px; }

.viagem-pct {
  font-size: 11px; font-weight: 700;
  margin-bottom: 6px; letter-spacing: .3px;
}

.viagem-bar {
  width: 72px; height: 4px;
  background: var(--card); border-radius: 99px; overflow: hidden;
}

.viagem-bar-fill {
  height: 100%; border-radius: 99px;
  background: var(--blue);
  animation: barFill .8s cubic-bezier(.16,1,.3,1) both;
  transition: width .6s cubic-bezier(.16,1,.3,1);
}
.viagem-bar-fill.done { background: var(--green); }

.viagem-chevron {
  font-size: 18px; color: var(--muted2);
  transition: transform .25s, color .15s; flex-shrink: 0;
  font-weight: 700;
}
.viagem-chevron.open { transform: rotate(90deg); color: var(--accent); }

.viagem-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 14px 22px;
  background: rgba(0,0,0,.15);
}
.viagem-body.open { display: block; animation: slideIn .25s cubic-bezier(.16,1,.3,1) both; }

/* ATIVIDADES */
.ativ-list { display: flex; flex-direction: column; gap: 6px; }

.ativ-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border2);
  border-radius: 10px;
  transition: background .15s, border-color .15s, transform .15s;
}
.ativ-row:hover { background: var(--card); transform: translateX(2px); }

.ativ-row.status-concluida { border-left-color: var(--green); }
.ativ-row.status-andamento { border-left-color: var(--blue); }
.ativ-row.status-pendente  { border-left-color: var(--amber); }

.ativ-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

.ativ-body { flex: 1; min-width: 0; }
.ativ-nome  { font-size: 13px; font-weight: 700; color: var(--text); }
.ativ-titulo { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500; }
.ativ-desc   { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.5; font-weight: 500; }

.badge {
  font-size: 10px; font-weight: 700;
  letter-spacing: .6px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 6px;
  white-space: nowrap; flex-shrink: 0;
  border: 1px solid transparent;
}
.badge-concluida { color: var(--green); background: var(--green-dim); border-color: var(--green-border); }
.badge-andamento { color: var(--blue);  background: var(--blue-dim);  border-color: var(--blue-border); }
.badge-pendente  { color: var(--amber); background: var(--amber-dim); border-color: var(--amber-border); }

/* RESERVA BOX */
.reserva-box {
  margin-top: 10px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 11px 13px;
}

.reserva-box-label {
  font-size: 9px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted2); margin-bottom: 8px;
}

.res-cols { display: flex; flex-wrap: wrap; gap: 6px 20px; }
.res-col label {
  display: block; font-size: 10px; color: var(--muted2);
  margin-bottom: 2px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase;
}
.res-col span { font-size: 12px; color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { text-align: center; padding: 80px 24px; color: var(--muted2); }
.empty-icon { font-size: 40px; margin-bottom: 16px; display: block; }
.empty-title { font-size: 15px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }

/* SPINNER */
.spinner-wrap { display: flex; align-items: center; justify-content: center; padding: 80px; }
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

/* RESPONSIVE */
/* ── RESPONSIVO ── */
@media (max-width: 640px) {
  /* Login */
  #login-wrap { padding: 24px 16px; align-items: flex-start; padding-top: 60px; }
  .login-box { max-width: 100%; }
  .login-headline { font-size: 24px; }
  .login-sub { font-size: 12px; }
  .login-wordmark { margin-bottom: 32px; }
  .login-divider { margin: 20px auto; }
  .login-field input { font-size: 16px; } /* evita zoom no iOS */
  .login-btn { font-size: 15px; padding: 15px; }

  /* Nav */
  .nav { padding: 0 14px; height: 52px; }
  .nav-brand-col { display: none; } /* só ícone no mobile */
  .nav-user { gap: 10px; font-size: 12px; }
  .nav-user span:first-child { display: none; }
  .nav-logout { padding: 5px 10px; font-size: 10px; }

  /* Hero */
  .hero { padding: 28px 16px 24px; }
  .hero-label { font-size: 9px; }
  .hero-greeting { font-size: 22px; margin-bottom: 2px; }
  .hero-email { font-size: 12px; margin-bottom: 20px; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat { padding: 12px 14px; border-radius: 10px; }
  .stat-num { font-size: 24px; }
  .stat-label { font-size: 9px; }

  /* Content */
  .content { padding: 20px 16px 60px; }
  .section-label { font-size: 9px; margin-bottom: 10px; }

  /* Viagem card */
  .viagem-card { border-radius: 12px; margin-bottom: 8px; }
  .viagem-header { padding: 14px 16px; gap: 10px; }
  .viagem-icon { width: 30px; height: 30px; border-radius: 7px; }
  .viagem-icon img { width: 18px !important; height: 18px !important; }
  .viagem-nome { font-size: 13px; }
  .viagem-meta { font-size: 11px; }
  .viagem-progress-wrap { min-width: 60px; }
  .viagem-bar { width: 50px; height: 3px; }
  .viagem-pct { font-size: 10px; margin-bottom: 4px; }
  .viagem-body { padding: 10px 14px; }
  .viagem-chevron { font-size: 15px; margin-left: 4px; }

  /* Atividades */
  .ativ-row { padding: 11px 12px; gap: 10px; border-radius: 9px; }
  .ativ-nome { font-size: 12px; }
  .ativ-titulo, .ativ-desc { font-size: 10px; }
  .badge { font-size: 9px; padding: 3px 7px; border-radius: 5px; letter-spacing: .3px; }

  /* Reserva box */
  .reserva-box { padding: 9px 11px; }
  .res-cols { gap: 5px 14px; }
  .res-col label { font-size: 9px; }
  .res-col span { font-size: 11px; }

  /* Touch targets mínimos 44px */
  .nav-logout { min-height: 36px; display: flex; align-items: center; }
  .viagem-header { min-height: 56px; }
}

@media (max-width: 380px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .hero-greeting { font-size: 20px; }
  .login-headline { font-size: 21px; }
  .viagem-nome { font-size: 12px; }
  .ativ-row { flex-wrap: wrap; }
  .badge { align-self: flex-start; margin-top: 4px; }
}
</style>
</head>

function statusLabel(s) {
  return {pendente:'Pendente',andamento:'Em andamento',concluida:'Concluída'}[s]||s;
}

var ORDEM=['Passagem Doméstica','Passagem Internacional','Hotel','Aluguel de Carro','Seguro Viagem','Ativação Seguro Cartão','Passeio/Atividade','Roteiro Personalizado'];

function sortAtivs(arr){
  return arr.slice().sort(function(a,b){
    var ia=ORDEM.indexOf(a.nome),ib=ORDEM.indexOf(b.nome);
    if(ia===-1)ia=ORDEM.length; if(ib===-1)ib=ORDEM.length;
    return ia-ib;
  });
}

function resCols(r) {
  if(!r) return [];
  var cols=[];
  if(r.tipo==='voo'){
    cols=[
      {label:'Trecho ida',val:(r.origem||'?')+' → '+(r.destino||'?')+(r.conexao?' (via '+r.conexao+')':'')},
      {label:'Data',val:fmtDate(r.dataIda)+(r.horaPartida?' · '+r.horaPartida:'')+(r.horaChegada?' → '+r.horaChegada:'')},
    ];
    if(r.dataVolta) cols.push({label:'Volta',val:(r.origemVolta||r.destino||'?')+' → '+(r.destinoVolta||r.origem||'?')});
    if(r.dataVolta) cols.push({label:'Data volta',val:fmtDate(r.dataVolta)+(r.horaPartidaVolta?' · '+r.horaPartidaVolta:'')});
    if(r.ciaIda||r.cia) cols.push({label:'Cia aérea',val:r.ciaIda||r.cia});
    if(r.pnr) cols.push({label:'Localizador',val:r.pnr});
  } else if(r.tipo==='hotel'){
    cols=[{label:'Hotel',val:r.hotelNome||null},{label:'Check-in',val:fmtDate(r.checkin)},{label:'Check-out',val:fmtDate(r.checkout)}];
    if(r.conf) cols.push({label:'Confirmação',val:r.conf});
  } else if(r.tipo==='carro'){
    cols=[{label:'Locadora',val:r.locadora||null},{label:'Retirada',val:fmtDate(r.retData)},{label:'Devolução',val:fmtDate(r.devData)}];
    if(r.conf) cols.push({label:'Confirmação',val:r.conf});
  } else if(r.tipo==='passeio'){
    cols=[{label:'Passeio',val:r.passeioNome||null},{label:'Data',val:fmtDate(r.dataPasseio)}];
    if(r.conf) cols.push({label:'Voucher',val:r.conf});
  }
  return cols.filter(function(c){return c.val;});
}

function renderPortal() {
  var viagens=(_dados.viagens||[]).slice().sort(function(a,b){return (a.inicio||'9')<(b.inicio||'9')?-1:1;});
  var reservas=_dados.reservas||[];
  var el=document.getElementById('portal-content');

  var totalAtivs=0,totalConc=0;
  viagens.forEach(function(v){var a=v.atividades||[];totalAtivs+=a.length;totalConc+=a.filter(function(x){return x.status==='concluida';}).length;});
  document.getElementById('stat-viagens').textContent=viagens.length;
  document.getElementById('stat-atividades').textContent=totalAtivs;
  document.getElementById('stat-concluidas').textContent=totalConc;
  document.getElementById('stat-reservas').textContent=reservas.length;

  if(!viagens.length){
    el.innerHTML='<div class="empty"><span class="empty-icon">🗺️</span><div class="empty-title">Nenhuma viagem encontrada</div></div>';
    return;
  }

  el.innerHTML=viagens.map(function(v,vi){
    var ativs=sortAtivs(v.atividades||[]);
    var total=ativs.length, conc=ativs.filter(function(a){return a.status==='concluida';}).length;
    var pct=total?Math.round(conc/total*100):0;
    var isDone=pct===100;
    var pctColor=isDone?'var(--green)':'var(--blue)';
    var meta=[];
    if(v.inicio&&v.fim) meta.push('📅 '+fmtDate(v.inicio)+' — '+fmtDate(v.fim));
    else if(v.inicio) meta.push('📅 A partir de '+fmtDate(v.inicio));
    if(total) meta.push(conc+'/'+total+' atividade'+(total>1?'s':''));
    var bodyId='vb'+vi;

    var ativsHtml=ativs.length?ativs.map(function(a){
      var res=a.reservaId?reservas.find(function(r){return r.id===a.reservaId;}):null;
      var cols=resCols(res);
      var st=a.status||'pendente';
      var bc='badge-'+st;
      var rowCls='ativ-row status-'+st;
      var resHtml=res?'<div class="reserva-box"><div class="reserva-box-label">Reserva vinculada</div><div class="res-cols">'+cols.map(function(c){return '<div class="res-col"><label>'+c.label+'</label><span>'+c.val+'</span></div>';}).join('')+'</div></div>':'';
      return '<div class="'+rowCls+'"><div class="ativ-icon">'+(a.icon||'·')+'</div><div class="ativ-body"><div class="ativ-nome">'+a.nome+'</div>'+(a.titulo?'<div class="ativ-titulo">'+a.titulo+'</div>':'')+(a.descricao?'<div class="ativ-desc">'+a.descricao+'</div>':'')+resHtml+'</div><span class="badge '+bc+'">'+statusLabel(a.status)+'</span></div>';
    }).join(''):'<div style="color:var(--muted);font-size:13px;padding:8px 0;font-weight:500">Nenhuma atividade cadastrada.</div>';

    return '<div class="viagem-card" style="animation-delay:'+(vi*60)+'ms"><div class="viagem-header" onclick="toggleViagem(\''+bodyId+'\','+vi+')"><div class="viagem-icon" style="background:transparent;border:none;padding:2px;"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAfUAAAH1CAMAAADYlpcjAAADAFBMVEX////v7+8rMkX/WF/t7ez9/fz7+/vx8fErMkfz8/P4+fj09fX+/v339/cpMUT9/fv9//z9/v/+/f7+V179/f7+/fz9WF7/WWAqMUUoM0UsNEcoMUP8/vwrM0gqMUYtMkf+//opM0b/WF0nLkH+/fv6+/r8/fgpMUYrNUUsNEn9WF0pMUH7/v77/PwpMEglLD8pMkP6/fr9V139V2D/WmD6+vz+V1wrMkgoLkMqNUcuNEj+Wl7+V2D/VVydoKoqNEr9+/zv7e37WF33+PcjKT/+WGLu7uz8W1r8Wl78WF/8WmEjLkE7P1D6/P4vNkosM0T+Vlr8WVr3+fns7u8vN0dBRlg0Ok0nMEUlK0H6+fgqM0NfZHTu7Oo3PE719vVKUF9jZ3ZbYW7/W2KfoasgKD37V1o7QlTw8e7U1tr8s7a6vsV4fIlGTFzq6+38/Pjz9ffp6evr7Ovm6Orx8vH79vZ2e4eTlqP9VVza3eKChZGiprH7/vvf4eT/+/79bnPu7/GMkZs+Q1T+/vn8VFnx8/VFS1h+g4/8+/f8jJCXm6X4//rGyM/t7fD78vHi5ej9Ulf8XmGNkp5OVGL9Y2lTWWjP0tb+6+3h4+X9ZWn+X2X9+fj9dHvw8fJla3f86uf92dyqrbb61dX8UFWlqrLDxs1rb3t1eYf87uz7W1/29/r/Ulv8enwnLUPy9PXX2Nv+lpv9gov8zs2/wsn+WFkzOUr7k5ecoKn+h4/83N6tsLj9y8/8T1b99PT+UFv8yMpwdYH49fOJjZcpNEVYXWrJy9GztL79cnbMztP85eSDipX/vMCzuL39xcb9o6f68PD+r7KQlZ5RVmb7anH9u73+4t7m5ur7WGDc3+H9wcO1ucEeJTr8rbD9aWygpKr9z9X9foHY299DSFkrMUv9d4D9TVS/wMX6WWL8qKr+d3v9m6Hy7/D73+L17u79naT66+r/WWj5j5T4naD9trv4WV33/f3/VV75np2pq7X4+/74uLP3/vr3x8Tytbv3io742d735OIONtevAAAACXBIWXMAAAdiAAAHYgE4epnbAAAFWGlUWHRYTUw6Y29tLmFkb2JlLnhtcAAAAAAAPD94cGFja2V0IGJlZ2luPSfvu78nIGlkPSdXNU0wTXBDZWhpSHpyZVN6TlRjemtjOWQnPz4KPHg6eG1wbWV0YSB4bWxuczp4PSdhZG9iZTpuczptZXRhLyc+CjxyZGY6UkRGIHhtbG5zOnJkZj0naHR0cDovL3d3dy53My5vcmcvMTk5OS8wMi8yMi1yZGYtc3ludGF4LW5zIyc+CgogPHJkZjpEZXNjcmlwdGlvbiByZGY6YWJvdXQ9JycKICB4bWxuczpBdHRyaWI9J2h0dHA6Ly9ucy5hdHRyaWJ1dGlvbi5jb20vYWRzLzEuMC8nPgogIDxBdHRyaWI6QWRzPgogICA8cmRmOlNlcT4KICAgIDxyZGY6bGkgcmRmOnBhcnNlVHlwZT0nUmVzb3VyY2UnPgogICAgIDxBdHRyaWI6Q3JlYXRlZD4yMDI2LTA3LTAxPC9BdHRyaWI6Q3JlYXRlZD4KICAgICA8QXR0cmliOkRhdGE+eyZxdW90O2RvYyZxdW90OzomcXVvdDtEQUhPSl9DVTFSdyZxdW90OywmcXVvdDt1c2VyJnF1b3Q7OiZxdW90O1V function toggleViagem(id,vi){
  var body=document.getElementById(id);
  var chev=document.getElementById('chev'+vi);
  var card=body.closest('.viagem-card');
  var open=body.classList.toggle('open');
  if(chev) chev.classList.toggle('open',open);
  if(card) card.classList.toggle('expanded',open);
}

function entrar() {
  var email=document.getElementById('login-email').value.trim().toLowerCase();
  var errEl=document.getElementById('login-error');
  if(!email||!email.includes('@')){errEl.textContent='Digite um e-mail válido.';return;}
  errEl.textContent='';
  var btn=document.getElementById('btn-entrar');
  btn.textContent='Aguarde…'; btn.disabled=true;

  fetch(PROXY+'/concierge/cfg')
    .then(function(r){return r.json();})
    .then(function(cfgRes){
      var cfg=cfgRes.data||{};
      if(!cfg.url) throw new Error('Serviço temporariamente indisponível.');
      function colIdx(l){var s=(l||'A').toUpperCase(),r=0;for(var i=0;i<s.length;i++)r=r*26+(s.charCodeAt(i)-64);return r-1;}
      var sheetUrl=cfg.url+'?aba='+encodeURIComponent(cfg.aba||'Clientes')+'&linha='+encodeURIComponent(cfg.linha||2);
      return fetch(sheetUrl).then(function(r){return r.json();}).then(function(sheetData){
        var rows=sheetData.rows||[];
        var clientesMatch=rows.map(function(row){return{nome:String(row[colIdx(cfg.colNome)]||'').trim(),email:String(row[colIdx(cfg.colEmail)]||'').trim().toLowerCase()};}).filter(function(c){return c.email===email&&c.nome;});
        if(!clientesMatch.length) throw new Error('Nenhuma viagem encontrada para este e-mail.');
        var nomesCliente=clientesMatch.map(function(c){var p=c.nome.trim().split(/\s+/);return(p[0].charAt(0).toUpperCase()+p[0].slice(1).toLowerCase())+(p[1]?' '+p[1].charAt(0).toUpperCase()+p[1].slice(1).toLowerCase():'');});
        return Promise.all([
          fetch(PROXY+'/concierge/viagens').then(function(r){return r.json();}),
          fetch(PROXY+'/concierge/reservas').then(function(r){return r.json();})
        ]).then(function(res){
          var todasViagens=res[0].data||[],todasReservas=res[1].data||[];
          function norm2(s){if(!s)return '';var p=s.trim().split(/\s+/);return(p[0].charAt(0).toUpperCase()+p[0].slice(1).toLowerCase())+(p[1]?' '+p[1].charAt(0).toUpperCase()+p[1].slice(1).toLowerCase():'');}
          function nomeMatch(campo){if(!campo)return false;var lista=Array.isArray(campo)?campo:String(campo).split(',');return lista.some(function(n){var normalizado=norm2(n.trim());return nomesCliente.some(function(nc){return normalizado===nc||normalizado.toLowerCase().split(' ')[0]===nc.toLowerCase().split(' ')[0];});});}
          return{clientes:clientesMatch,nomesCliente:nomesCliente,viagens:todasViagens.filter(function(v){var c=Array.isArray(v.clientes)?v.clientes:(typeof v.clientes==='string'?v.clientes.split(','):[v.clientes]);return c.some(function(n){return nomeMatch(n.trim());});}),reservas:todasReservas.filter(function(r){return nomeMatch(r.cliente);})};
        });
      });
    })
    .then(function(dados){
      btn.innerHTML='Acessar →'; btn.disabled=false;
      _dados=dados;
      var nome=toTitleCase(dados.clientes[0].nome).split(' ')[0];
      document.getElementById('portal-nome').innerHTML='Olá, <span style="color:var(--accent)">'+nome+'</span> 👋';
      document.getElementById('nav-nome').textContent=nome;
      document.getElementById('portal-email').textContent=email;
      document.getElementById('login-wrap').style.display='none';
      var pw=document.getElementById('portal-wrap');
      pw.style.display='block';
      pw.classList.add('fade-in');
      renderPortal();
    })
    .catch(function(e){
      btn.innerHTML='Acessar →'; btn.disabled=false;
      errEl.textContent=e.message||'Erro de conexão. Tente novamente.';
    });
}

function sair(){
  _dados=null;
  var pw=document.getElementById('portal-wrap');
  pw.style.display='none'; pw.classList.remove('fade-in');
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('login-email').value='';
  document.getElementById('login-error').textContent='';
}

document.getElementById('login-email').focus();
</script>
